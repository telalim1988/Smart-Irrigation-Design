<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <title>Smart-Irrigation-DCS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>Smart-Irrigation-DCS</h1>
  <div class="status">SYSTEM ONLINE</div>
</div>

<!-- MAIN GRID -->
<div class="container">

  <!-- LEFT PANEL (INPUTS) -->
  <div class="panel">

    <h3>CONTROL PANEL</h3>

    <div class="card">
      <h4>System</h4>
      <select id="system">
  <option value="drip">Drip</option>
  <option value="sprinkler">Sprinkler</option>
</select>
    </div>

    <div class="card">
  <h4>Water Requirement</h4>
  <input id="et0" type="number" placeholder="ET0 (mm/day)">
  <input id="kc" type="number" placeholder="Kc">
</div>

<div class="card">
  <h4>Field</h4>
  <input id="area" type="number" placeholder="Area (m²)">
  <input id="zones" type="number" placeholder="Zones">
  <div class="card">
  <h4>Emitters / Sprinklers</h4>
  <input id="emitter_flow" type="number" placeholder="Emitter Flow (L/hr)">
</div>
</div>

<div class="card">
  <h4>Operation</h4>
  <input id="hours" type="number" placeholder="Operating Hours/day">
</div>


   <div class="card">
  <h4>Hydraulics</h4>
  <input id="length" type="number" placeholder="Pipe Length (m)">
  <input id="elevation" type="number" placeholder="Elevation (m)">
  <input id="velocity" type="number" placeholder="Velocity (m/s)">
</div>

<div class="card">
  <h4>Material</h4>
  <select id="material">
    <option value="pvc">PVC</option>
    <option value="hdpe">HDPE</option>
    <option value="steel">Steel</option>
  </select>
</div>

   <button class="run-btn" onclick="calculate()">RUN DESIGN</button>

  </div>

  <!-- CENTER PANEL (PROCESS) -->
  <div class="panel">

    <h3>PROCESS</h3>

    <div class="box">
      <p>FLOW RATE</p>
      <span>0</span>
    </div>

    <div class="box">
      <p>HEAD LOSS</p>
      <span>0</span>
    </div>

    <div class="box">
      <p>TDH</p>
      <span>0</span>
    </div>

  </div>

  <!-- RIGHT PANEL (PUMP) -->
  <div class="panel">

    <h3>PUMP</h3>

    <div class="box">
      <p>POWER (kW)</p>
      <span>0</span>
    </div>

    <div class="box">
      <p>PIPE DIAMETER</p>
      <span>0</span>
    </div>

    <div class="box">
  <p>ALERTS</p>
  <span id="alerts">OK</span>
</div>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  SYSTEM LOG: Ready...
</div>
<script src="main.js"></script>
</body>
</html>
